org: techwin

app: my-app

service: poll-voting-app

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1

  # CORS FIX
  httpApi:
    cors:
      allowedOrigins:
        - http://wed-poll-app.s3-website.eu-north-1.amazonaws.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowCredentials: false

  environment:
    POLLS_TABLE: ${self:service}-polls-${sls:stage}
    SMTP_HOST: ${env:SMTP_HOST}
    SMTP_PORT: ${env:SMTP_PORT}
    SMTP_USER: ${env:SMTP_USER}
    SMTP_PASS: ${env:SMTP_PASS}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource: !GetAtt PollsTable.Arn

functions:
  createPoll:
    handler: handler.createPoll
    events:
      - httpApi:
          path: /polls
          method: POST

  getPoll:
    handler: handler.getPoll
    events:
      - httpApi:
          path: /polls/{id}
          method: GET

  submitVote:
    handler: handler.submitVote
    events:
      - httpApi:
          path: /polls/{id}/vote
          method: POST

  sendResults:
    handler: handler.sendResults
    events:
      - httpApi:
          path: /polls/{id}/send
          method: POST

  listPolls:
    handler: handler.listPolls
    events:
      - httpApi:
          path: /polls
          method: GET

resources:
  Resources:
    PollsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.POLLS_TABLE}

        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S

        KeySchema:
          - AttributeName: id
            KeyType: HASH

        BillingMode: PAY_PER_REQUEST

plugins:
  - serverless-offline